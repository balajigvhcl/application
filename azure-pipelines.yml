trigger:
  - main
  - develop

pr:
  - main

pool:
  vmImage: 'ubuntu-latest'

variables:
  dockerRegistryServiceConnection: 'DockerHubServiceConnection'  # Service connection name in Azure DevOps
  containerRegistry: 'DockerHubServiceConnection'
  dockerfilePath: '$(Build.SourcesDirectory)/Dockerfile'
  imageName: '1601071/docker-images'  # Image name without tag
  latestTag: 'latest'

stages:
  - stage: Build_and_Push
    displayName: 'Build Docker Image and Push to Registry'
    jobs:
      - job: BuildAndPush
        displayName: 'Build and Push Docker Image'
        steps:
          - task: Docker@2
            displayName: 'Build Docker Image'
            inputs:
              command: 'build'
              Dockerfile: $(dockerfilePath)
              repository: $(imageName)
              tags: |
                $(latestTag)
              arguments: '--build-arg BUILD_ID=$(Build.BuildId) --build-arg BUILD_DATE=$(Build.BuildNumber)'

          - task: Docker@2
            displayName: 'Login to Docker Registry'
            inputs:
              command: 'login'
              containerRegistry: $(dockerRegistryServiceConnection)

          - task: Docker@2
            displayName: 'Push Image to Docker Registry'
            inputs:
              command: 'push'
              repository: $(imageName)
              tags: |
                $(latestTag)
              containerRegistry: $(dockerRegistryServiceConnection)

          - task: Docker@2
            displayName: 'Logout from Docker Registry'
            inputs:
              command: 'logout'
              containerRegistry: $(dockerRegistryServiceConnection)

  - stage: Verify
    displayName: 'Verify Docker Image'
    dependsOn: Build_and_Push
    condition: succeeded()
    jobs:
      - job: VerifyImage
        displayName: 'Verify Published Image'
        steps:
          - script: |
              echo "Docker image pushed successfully!"
              echo "Repository: $(imageName)"
              echo "Tag: $(latestTag)"
              echo "Pull command: docker pull $(imageName):$(latestTag)"
            displayName: 'Display Image Information'
